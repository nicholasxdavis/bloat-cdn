name: Sync detail
run-name: "${{ github.event.repository.name }} | Bi-monthly details | ${{ github.run_id }}"

on:
  schedule:
    # 1st of Jan, Mar, May, Jul, Sep, Nov at 11:00 UTC
    - cron: '0 11 1 1,3,5,7,9,11 *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bloat-sync-detail
  cancel-in-progress: false

jobs:
  sync:
    name: Detail sync (awards, vitals, headshots)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ingest/package-lock.json

      - name: Install dependencies
        working-directory: ingest
        run: npm ci

      - name: Run detail sync
        run: npm run sync-detail
        env:
          BLOAT_DELAY_MS: '400'
          BLOAT_FETCH_RETRIES: '4'

      - name: Commit sync changes
        run: bash .github/scripts/commit-sync.sh "bi-monthly detail update"
