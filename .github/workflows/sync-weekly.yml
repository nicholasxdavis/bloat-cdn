name: Sync weekly
run-name: "${{ github.event.repository.name }} | Weekly profiles | ${{ github.run_id }}"

on:
  schedule:
    # Sundays 10:00 UTC — roster / active status
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bloat-sync-weekly
  cancel-in-progress: false

jobs:
  sync:
    name: Profile sync (all ingested players)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ingest/package-lock.json

      - name: Install dependencies
        working-directory: ingest
        run: npm ci

      - name: Run weekly profile sync
        run: npm run sync-weekly
        env:
          BLOAT_DELAY_MS: '400'
          BLOAT_FETCH_RETRIES: '4'

      - name: Commit sync changes
        run: bash .github/scripts/commit-sync.sh "weekly profile update"
