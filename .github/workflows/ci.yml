name: CI
run-name: "${{ github.event.repository.name }} | CI | ${{ github.run_id }}"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ingest/**'
      - 'published/meta/**'
      - '.github/**'
      - 'package.json'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck ingest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ingest/package-lock.json

      - name: Install
        working-directory: ingest
        run: npm ci

      - name: Typecheck
        working-directory: ingest
        run: npm run typecheck

  dry-run-season:
    name: Verify season gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ingest/package-lock.json

      - name: Install
        working-directory: ingest
        run: npm ci

      - name: Nightly dry-run
        run: npm run sync-nightly -- --dry-run
